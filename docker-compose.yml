# MoKV Docker Compose 配置
# 使用方式: docker-compose up -d
# 查看日志: docker-compose logs -f

services:
  mokv-1:
    build: .
    container_name: mokv-1
    ports:
      - "9001:9001"
    volumes:
      - mokv1-data:/data
    environment:
      - MOKV_PORT=9001
      - MOKV_NODE_ID=1
    networks:
      mokv-net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "9001"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mokv-2:
    build: .
    container_name: mokv-2
    ports:
      - "9002:9001"
    volumes:
      - mokv2-data:/data
    environment:
      - MOKV_PORT=9001
      - MOKV_NODE_ID=2
    networks:
      mokv-net:
        ipv4_address: 172.28.0.11
    depends_on:
      - mokv-1
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "9001"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mokv-3:
    build: .
    container_name: mokv-3
    ports:
      - "9003:9001"
    volumes:
      - mokv3-data:/data
    environment:
      - MOKV_PORT=9001
      - MOKV_NODE_ID=3
    networks:
      mokv-net:
        ipv4_address: 172.28.0.12
    depends_on:
      - mokv-1
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "9001"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  mokv-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mokv1-data:
  mokv2-data:
  mokv3-data:
